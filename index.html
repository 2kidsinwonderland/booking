<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>線上預約系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --p50:#f3f0ff;--p100:#ede7f6;--p200:#d1c4e9;--p300:#b39ddb;
  --p400:#9575cd;--p600:#673ab7;--p700:#512da8;
  --g50:#fafafa;--g100:#f5f5f5;--g200:#eeeeee;--g300:#e0e0e0;
  --g400:#bdbdbd;--g500:#9e9e9e;--g600:#757575;--g700:#616161;--g800:#424242;
  --sh-sm:0 1px 4px rgba(103,58,183,.09);--sh-md:0 4px 16px rgba(103,58,183,.13);--sh-lg:0 8px 32px rgba(103,58,183,.18);
  --r:8px;--rm:12px;--rl:20px;--tr:.24s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--p50);color:var(--g800);}
.screen{display:none;flex-direction:column;min-height:100vh;}
.screen.active{display:flex;}
.btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:50px;font-family:inherit;font-weight:500;cursor:pointer;transition:var(--tr);}
.btn-primary{background:var(--p400);color:#fff;padding:14px 36px;font-size:16px;}
.btn-primary:hover{background:var(--p600);transform:translateY(-2px);box-shadow:var(--sh-md);}
.btn-ghost{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.45);padding:8px 18px;font-size:13px;backdrop-filter:blur(6px);}
.btn-ghost:hover{background:rgba(255,255,255,.32);}
.gear-btn{
  width:38px;height:38px;
  background:rgba(255,255,255,.15);
  color:#fff;border:1px solid rgba(255,255,255,.35);
  border-radius:50%;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);transition:all .22s;
  padding:0;line-height:1;
}
.gear-btn:hover{background:rgba(255,255,255,.30);transform:rotate(30deg);}
.btn-outline{background:transparent;color:var(--p600);border:1.5px solid var(--p300);padding:12px 26px;font-size:15px;}
.btn-outline:hover{background:var(--p100);border-color:var(--p400);}
.phdr{background:#fff;padding:16px 28px;display:flex;align-items:center;gap:14px;box-shadow:var(--sh-sm);position:sticky;top:0;z-index:10;}
.phdr h2{font-size:17px;font-weight:600;color:var(--p600);}
.back-btn{background:none;border:none;cursor:pointer;color:var(--p400);font-size:22px;line-height:1;padding:2px 6px;transition:color .2s;}
.back-btn:hover{color:var(--p700);}

/* HOME */
#screen-home{position:relative;align-items:center;justify-content:center;text-align:center;}
.home-bg{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0;}
.home-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(103,58,183,.68),rgba(179,157,219,.52));}
.home-topbar{position:absolute;top:20px;right:24px;z-index:2;}
.home-content{position:relative;z-index:1;max-width:680px;padding:60px 28px;}
.home-badge{display:inline-block;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;font-size:13px;padding:6px 18px;border-radius:50px;margin-bottom:26px;letter-spacing:1px;}
.home-title{font-size:clamp(28px,6vw,54px);font-weight:700;color:#fff;line-height:1.15;margin-bottom:22px;text-shadow:0 2px 12px rgba(0,0,0,.22);}
.home-body{font-size:17px;color:rgba(255,255,255,.88);line-height:1.85;margin-bottom:44px;font-weight:300;}

/* BOOKING */
#screen-booking{background:var(--p50);}
.bk-body{flex:1;max-width:740px;width:100%;margin:32px auto;padding:0 20px 56px;}
.card{background:#fff;border-radius:var(--rl);padding:26px;box-shadow:var(--sh-sm);margin-bottom:20px;}
.sec-lbl{font-size:11px;font-weight:700;color:var(--p400);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;}
.cal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.cal-nav{background:var(--p100);border:none;color:var(--p600);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:var(--tr);}
.cal-nav:hover{background:var(--p200);}
.cal-mo{font-size:17px;font-weight:600;color:var(--g800);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-wd{text-align:center;font-size:11px;font-weight:600;color:var(--g400);padding:2px 0 10px;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:13px;transition:var(--tr);position:relative;cursor:default;user-select:none;}
.cal-day.disabled{color:var(--g300);}
.cal-day.avail{color:var(--p600);font-weight:600;background:var(--p50);cursor:pointer;}
.cal-day.avail:hover{background:var(--p200);}
.cal-day.sel{background:var(--p400);color:#fff;font-weight:700;box-shadow:0 3px 10px rgba(149,117,205,.38);}
.cal-day.today:not(.sel)::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;background:var(--p300);border-radius:50%;}
.slots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:9px;}
.slot-btn{padding:11px 8px;border-radius:var(--r);border:1.5px solid;font-size:14px;font-family:inherit;text-align:center;line-height:1.45;transition:var(--tr);}
.slot-btn.av{border-color:var(--p300);color:var(--p600);background:#fff;cursor:pointer;}
.slot-btn.av:hover{background:var(--p100);border-color:var(--p400);transform:translateY(-1px);}
.slot-btn.sel{background:var(--p400);border-color:var(--p400);color:#fff;cursor:pointer;box-shadow:0 3px 10px rgba(149,117,205,.35);}
.slot-btn.full{border-color:var(--g300);color:var(--g400);background:var(--g100);cursor:not-allowed;opacity:.58;}
.slot-sub{display:block;font-size:11px;margin-top:3px;opacity:.75;}
.slots-ph{text-align:center;color:var(--g400);padding:30px 0;font-size:15px;}

/* FORM */
#screen-form{background:var(--p50);}
.fm-body{flex:1;max-width:580px;width:100%;margin:32px auto;padding:0 20px 56px;}
.bk-sum{background:var(--p100);border-radius:var(--rm);padding:15px 20px;margin-bottom:22px;display:flex;align-items:center;gap:14px;}
.sum-text{font-size:15px;font-weight:600;color:var(--p700);}
.sum-sub{font-size:13px;color:var(--p400);margin-top:2px;}
.fg{margin-bottom:19px;}
.fg label{display:block;font-size:13px;font-weight:600;color:var(--g700);margin-bottom:7px;}
.req{color:var(--p400);margin-left:2px;}
.fg input,.fg textarea{width:100%;padding:11px 14px;border:1.5px solid var(--g300);border-radius:var(--r);font-size:15px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;color:var(--g800);background:#fff;}
.fg input:focus,.fg textarea:focus{border-color:var(--p300);box-shadow:0 0 0 3px rgba(179,157,219,.18);}
.fg textarea{resize:vertical;min-height:86px;}
.f-err{font-size:12px;color:#e53935;margin-top:5px;display:none;}
.f-err.show{display:block;}
/* 重複預約警告橫幅 */
.dup-warn{background:#fff3e0;border:1.5px solid #ffb74d;border-radius:var(--r);padding:13px 16px;font-size:14px;color:#e65100;margin-bottom:18px;display:none;line-height:1.6;}
.dup-warn.show{display:block;}

/* SUCCESS */
#screen-success{align-items:center;justify-content:center;background:var(--p50);padding:32px 20px;}
.success-card{background:#fff;border-radius:var(--rl);padding:52px 44px;text-align:center;box-shadow:var(--sh-lg);max-width:460px;width:100%;}
.success-icon{width:70px;height:70px;background:#e8f5e9;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-size:36px;}
.success-title{font-size:24px;font-weight:700;color:var(--g800);margin-bottom:10px;}
.success-body{font-size:15px;color:var(--g500);line-height:1.8;margin-bottom:26px;}
.success-detail{background:var(--p50);border-radius:var(--rm);padding:16px 20px;text-align:left;margin-bottom:28px;font-size:14px;color:var(--p700);line-height:2.1;}

@media(max-width:600px){
  .bk-body,.fm-body{padding:0 12px 48px;}
  .card{padding:18px 14px;}
  .success-card{padding:36px 20px;}
  .phdr{padding:14px 16px;}
}
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="home-bg" id="home-bg"></div>
  <div class="home-topbar">
    <!-- 後台按鈕連結由 JS 從 localStorage 讀取隱藏網址 -->
    <button class="gear-btn" id="admin-link-btn" onclick="goAdminPage()" title="管理後台">⚙</button>
  </div>
  <div class="home-content">
    <div class="home-badge" id="home-badge">專業服務</div>
    <h1 class="home-title" id="home-title">歡迎使用線上預約</h1>
    <p class="home-body" id="home-body">我們提供便捷的線上預約服務，讓您輕鬆安排時間，享受專業的服務體驗。請選擇您方便的日期與時段進行預約。</p>
    <button class="btn btn-primary" onclick="goBooking()">立即預約</button>
  </div>
</div>

<!-- BOOKING -->
<div id="screen-booking" class="screen">
  <div class="phdr">
    <button class="back-btn" onclick="goHome()">←</button>
    <h2>選擇日期與時段</h2>
  </div>
  <div class="bk-body">
    <div class="card">
      <div class="sec-lbl">選擇日期</div>
      <div class="cal-hdr">
        <button class="cal-nav" onclick="calPrev()">‹</button>
        <span class="cal-mo" id="cal-month"></span>
        <button class="cal-nav" onclick="calNext()">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="card">
      <div class="sec-lbl">選擇時段</div>
      <div id="slots-content"><div class="slots-ph">請先選擇上方日期</div></div>
    </div>
  </div>
</div>

<!-- FORM -->
<div id="screen-form" class="screen">
  <div class="phdr">
    <button class="back-btn" onclick="goBooking()">←</button>
    <h2>填寫預約資料</h2>
  </div>
  <div class="fm-body">
    <div class="bk-sum">
      <div style="font-size:26px;">📅</div>
      <div>
        <div class="sum-text" id="sum-dt">—</div>
        <div class="sum-sub">您選擇的預約時間</div>
      </div>
    </div>
    <div class="card">
      <!-- 重複預約警告 -->
      <div class="dup-warn" id="dup-warn"></div>
      <div id="form-fields"></div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;">
        <button class="btn btn-primary" onclick="submitForm()" style="flex:1;min-width:130px;">確認送出</button>
        <button class="btn btn-outline" onclick="goBooking()">返回修改</button>
      </div>
    </div>
  </div>
</div>

<!-- SUCCESS -->
<div id="screen-success" class="screen">
  <div class="success-card">
    <div class="success-icon">✓</div>
    <h2 class="success-title">預約成功！</h2>
    <p class="success-body">感謝您的預約，我們將盡快為您安排服務。</p>
    <div class="success-detail" id="success-detail"></div>
    <button class="btn btn-primary" onclick="goHome()" style="width:100%;">返回首頁</button>
  </div>
</div>

<script>
/* ═══ DATA ═══ */
function loadData(){
  try{ return JSON.parse(localStorage.getItem('bookingApp')||'null') || makeDefault(); }
  catch(e){ return makeDefault(); }
}
function makeDefault(){
  return {
    home:{ badge:'專業服務', title:'歡迎使用線上預約', body:'我們提供便捷的線上預約服務，讓您輕鬆安排時間，享受專業的服務體驗。請選擇您方便的日期與時段進行預約。', bg:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1600&q=80' },
    admin:{ user:'admin', pass:'1234' },
    adminToken: 'admin',   /* 後台網址 token，預設為 admin.html */
    gasUrl:'',
    schedule:{},
    bookings:[],
    fields:[
      {id:'name',  label:'姓名',    type:'text',     required:true,  isDefault:true},
      {id:'phone', label:'手機號碼', type:'tel',      required:true,  isDefault:true},
      {id:'email', label:'Gmail',   type:'email',    required:true,  isDefault:true},
      {id:'note',  label:'其他備註', type:'textarea', required:false, isDefault:true}
    ]
  };
}
function saveData(d){ localStorage.setItem('bookingApp', JSON.stringify(d)); }

/* ═══ ROUTER ═══ */
var STATE = { date: null, slot: null };
function showOnly(id){
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function goHome(){ applyHome(); showOnly('screen-home'); }
function goBooking(){ renderCalendar(); showOnly('screen-booking'); }
function goForm(){
  document.getElementById('sum-dt').textContent = STATE.date + '　' + STATE.slot;
  document.getElementById('dup-warn').classList.remove('show');
  renderFormFields();
  showOnly('screen-form');
}
function goSuccess(){ showOnly('screen-success'); }

/* ═══ 後台連結：從 localStorage 讀取 token，不硬寫在 HTML ═══ */
function goAdminPage(){
  var d = loadData();
  var token = d.adminToken || 'admin';
  window.location.href = token + '.html';
}

/* ═══ HOME ═══ */
function applyHome(){
  var h = loadData().home;
  document.getElementById('home-badge').textContent = h.badge;
  document.getElementById('home-title').textContent = h.title;
  document.getElementById('home-body').textContent  = h.body;
  document.getElementById('home-bg').style.backgroundImage = "url('" + h.bg + "')";
}

/* ═══ CALENDAR ═══ */
var calY, calM;
(function(){ var n=new Date(); calY=n.getFullYear(); calM=n.getMonth(); })();
function calPrev(){ calM--; if(calM<0){calM=11;calY--;} renderCalendar(); }
function calNext(){ calM++; if(calM>11){calM=0;calY++;} renderCalendar(); }
function pad(n){ return String(n).padStart(2,'0'); }

function renderCalendar(){
  var d = loadData();
  var labels = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-month').textContent = calY + ' 年 ' + labels[calM];
  var grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['日','一','二','三','四','五','六'].forEach(function(w){
    var el=document.createElement('div'); el.className='cal-wd'; el.textContent=w; grid.appendChild(el);
  });
  var firstDay = new Date(calY,calM,1).getDay();
  var daysInMonth = new Date(calY,calM+1,0).getDate();
  var today = new Date(); today.setHours(0,0,0,0);
  for(var i=0;i<firstDay;i++){ var e=document.createElement('div'); e.className='cal-day'; grid.appendChild(e); }
  for(var day=1;day<=daysInMonth;day++){
    var el=document.createElement('div'); el.className='cal-day'; el.textContent=day;
    var ds=calY+'-'+pad(calM+1)+'-'+pad(day);
    var cd=new Date(calY,calM,day);
    if(cd.toDateString()===today.toDateString()) el.classList.add('today');
    var isPast=cd<today;
    var hasSlots=d.schedule[ds]&&d.schedule[ds].length>0;
    if(!isPast&&hasSlots){
      el.classList.add('avail');
      if(STATE.date===ds) el.classList.add('sel');
      (function(s){ el.onclick=function(){ selectDate(s); }; })(ds);
    } else { el.classList.add('disabled'); }
    grid.appendChild(el);
  }
}

function selectDate(ds){
  STATE.date=ds; STATE.slot=null;
  renderCalendar(); renderSlots(ds);
  document.getElementById('slots-content').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderSlots(ds){
  var d=loadData();
  var slots=d.schedule[ds]||[];
  var wrap=document.getElementById('slots-content'); wrap.innerHTML='';
  if(!slots.length){ wrap.innerHTML='<div class="slots-ph">此日期暫無可用時段</div>'; return; }
  var grid=document.createElement('div'); grid.className='slots-grid';
  slots.forEach(function(slot){
    var booked=d.bookings.filter(function(b){ return b.date===ds&&b.time===slot.time&&b.status!=='cancelled'; }).length;
    var full=booked>=slot.quota;
    var btn=document.createElement('button');
    btn.className='slot-btn '+(full?'full':(STATE.slot===slot.time?'sel':'av'));
    btn.innerHTML=slot.time+'<span class="slot-sub">'+(full?'已額滿':'剩 '+(slot.quota-booked)+' 位')+'</span>';
    btn.disabled=full;
    if(!full)(function(t){
      btn.onclick=function(){
        /* 點選時段時即時重新讀取名額，確認尚未額滿 */
        var freshCheck=loadData();
        var cfg=(freshCheck.schedule[ds]||[]).find(function(s){ return s.time===t; });
        if(cfg){
          var nb=freshCheck.bookings.filter(function(b){ return b.date===ds&&b.time===t&&b.status!=='cancelled'; }).length;
          if(nb>=cfg.quota){ renderSlots(ds); return; } /* 已滿：重新渲染顯示額滿，不跳頁 */
        }
        STATE.slot=t; renderSlots(ds); setTimeout(goForm,220);
      };
    })(slot.time);
    grid.appendChild(btn);
  });
  wrap.appendChild(grid);
}

/* ═══ FORM ═══ */
function renderFormFields(){
  var d=loadData(); var wrap=document.getElementById('form-fields'); wrap.innerHTML='';
  d.fields.forEach(function(f){
    var div=document.createElement('div'); div.className='fg';
    var lbl=document.createElement('label');
    lbl.innerHTML=f.label+(f.required?'<span class="req">＊</span>':'');
    div.appendChild(lbl);
    var inp=f.type==='textarea'?document.createElement('textarea'):document.createElement('input');
    if(f.type!=='textarea') inp.type=f.type;
    inp.id='f-'+f.id; inp.placeholder=f.label;
    div.appendChild(inp);
    var err=document.createElement('div'); err.className='f-err'; err.id='fe-'+f.id;
    div.appendChild(err);
    wrap.appendChild(div);
  });
}

/* ═══ 安全功能①：防重複預約 ═══
   同一手機號碼或 Email 在同一日期+時段不可重複預約（狀態非 cancelled）*/
function checkDuplicate(d, phone, email){
  return d.bookings.some(function(b){
    if(b.status === 'cancelled') return false;
    if(b.date !== STATE.date || b.time !== STATE.slot) return false;
    var samePhone = phone && b.phone && b.phone === phone;
    var sameEmail = email && b.email && b.email.toLowerCase() === email.toLowerCase();
    return samePhone || sameEmail;
  });
}

function submitForm(){
  var d=loadData(); var valid=true;
  var rec={ date:STATE.date, time:STATE.slot, status:'pending', createdAt:new Date().toLocaleString('zh-TW') };
  var warnEl = document.getElementById('dup-warn');
  warnEl.classList.remove('show');

  d.fields.forEach(function(f){
    var el=document.getElementById('f-'+f.id);
    var err=document.getElementById('fe-'+f.id);
    err.textContent=''; err.classList.remove('show');
    var val=el?el.value.trim():'';
    if(f.required&&!val){ err.textContent='請填寫'+f.label; err.classList.add('show'); valid=false; }
    else if(f.type==='email'&&val&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)){ err.textContent='Email 格式不正確'; err.classList.add('show'); valid=false; }
    else if(f.type==='tel'&&val&&!/^09\d{8}$/.test(val.replace(/\s/g,''))){ err.textContent='請輸入正確手機號碼（09xxxxxxxx）'; err.classList.add('show'); valid=false; }
    rec[f.id]=val;
  });

  if(!valid) return;

  /* 即時名額再確認（防止兩人同時搶同一時段） */
  var freshD = loadData();
  var slotCfg = (freshD.schedule[STATE.date]||[]).find(function(s){ return s.time===STATE.slot; });
  if(slotCfg){
    var nowBooked = freshD.bookings.filter(function(b){ return b.date===STATE.date&&b.time===STATE.slot&&b.status!=='cancelled'; }).length;
    if(nowBooked >= slotCfg.quota){
      warnEl.innerHTML = '⚠️ 非常抱歉，此時段名額已滿（剛被預約完畢），請返回選擇其他時段。';
      warnEl.classList.add('show');
      warnEl.scrollIntoView({behavior:'smooth', block:'nearest'});
      return;
    }
  }

  /* 重複預約檢查 */
  if(checkDuplicate(d, rec.phone, rec.email)){
    warnEl.innerHTML = '⚠️ 您已使用相同的手機號碼或 Email 預約過此時段，請勿重複預約。<br>如需修改請聯繫我們。';
    warnEl.classList.add('show');
    warnEl.scrollIntoView({behavior:'smooth', block:'nearest'});
    return;
  }

  d.bookings.push(rec);
  saveData(d);

  var det='📅 日期：'+STATE.date+'<br>🕐 時段：'+STATE.slot;
  d.fields.forEach(function(f){ if(rec[f.id]) det+='<br>• '+f.label+'：'+rec[f.id]; });
  document.getElementById('success-detail').innerHTML=det;

  syncRecord(rec,d);
  goSuccess();
}

function syncRecord(rec,d){
  if(!d.gasUrl) return;
  var p={日期:rec.date,時段:rec.time,狀態:rec.status,建立時間:rec.createdAt};
  d.fields.forEach(function(f){ p[f.label]=rec[f.id]||''; });
  fetch(d.gasUrl,{method:'POST',body:JSON.stringify(p)}).catch(function(){});
}

/* ═══ INIT ═══ */
applyHome();
</script>
